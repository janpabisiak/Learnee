<section class="flex flex-col max-w-7xl mx-auto">
    <app-section-title [title]="'wordlist.title' | translate" [tagContent]="'wordlist.count' | translate: {'count': numOfWords}" [buttonType]="'no-background'" [buttonIcon]="'add-circle-outline'" [buttonContent]="'wordlist.addNew' | translate" (buttonClicked)="toggleIsAddWordModalOpen(true)"></app-section-title>
    <div class="flex flex-col lg:grid lg:grid-cols-[2fr_22rem] mt-6 gap-6">
        <app-word-list></app-word-list>
        <div class="flex flex-col md:flex-row lg:flex-col gap-3">
            <app-words-of-the-day class="flex-1 lg:flex-none"></app-words-of-the-day>
            <app-user-statistics class="flex-1 lg:flex-none"></app-user-statistics>
        </div>
    </div>
</section>
