<main class="py-8 flex-1">
    <div class="flex flex-col max-w-7xl mx-auto">
        <section class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <h2 class="text-5xl font-bold">Wordlist</h2>
                <span class="bg-emerald-600 text-gray-100 rounded-xl px-3 py-1">{{wordList.length}} words</span>
            </div>
            <button class="flex items-center gap-1.5 text-xl text-gray-500 cursor-pointer" (click)="toggleIsAddWordModalOpen(true)"><ion-icon class="text-2xl ionicon-thick" name="add-circle-outline"></ion-icon> Add new word</button>
        </section>
        <section class="grid grid-cols-[2fr_0.75fr] mt-6 gap-6">
            <app-word-list></app-word-list>
            <div class="bg-gray-100 p-6 max-h-64 rounded-xl">
                <p>test</p>
            </div>
        </section>
    </div>
</main>
