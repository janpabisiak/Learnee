<main class="p-8 flex-1">
    <div class="flex flex-col max-w-7xl mx-auto">
        <section class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <h2 class="text-5xl font-bold">Wordlist</h2>
                <span class="bg-emerald-600 text-gray-100 rounded-xl px-3 py-1">{{wordList.length}} words</span>
            </div>
            <app-button [type]="'no-background'" [icon]="'add-circle-outline'" (buttonClicked)="toggleIsAddWordModalOpen(true)">Add new word</app-button>
        </section>
        <section class="flex flex-col lg:grid lg:grid-cols-[2fr_22rem] mt-6 gap-6">
            <app-word-list></app-word-list>
            <div class="flex flex-col md:flex-row lg:flex-col gap-3">
                <app-words-of-the-day class="flex-1 lg:flex-none"></app-words-of-the-day>
                <app-user-statistics class="flex-1 lg:flex-none"></app-user-statistics>
            </div>
        </section>
    </div>
</main>
