<h3 class="text-2xl font-bold text-center mb-2">Level progress</h3>
<div class="flex gap-3">
    <h5>Level {{level + 1}}</h5>
    <app-progress-bar class="flex-1" [progress]="levelProgress" [tooltipContent]="`${xpPoints} / ${xpForNextLevel}`"></app-progress-bar>
    <h5>Level {{level + 2}}</h5>
</div>
