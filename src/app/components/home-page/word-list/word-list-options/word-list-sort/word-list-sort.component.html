<select class="p-3 bg-gray-100 rounded-md border-1 border-gray-200 h-12 w-full dark:bg-zinc-800 dark:border-zinc-700" (change)="changeSortType(select.value)" #select>
    @for (sortType of sortTypes; track sortType.type) {
    <option [value]="sortType.type" [selected]="sortType.type === currentSortType">{{sortType.translationKey | translate}}</option>
    }
</select>
