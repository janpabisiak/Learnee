@if (!hasWords) {
<div class="flex flex-col items-center gap-1 bg-gray-100 p-6 rounded-xl shadow-xs dark:bg-zinc-800">
    <ion-icon class="p-3 text-6xl text-gray-600 bg-gray-200 ionicon-thick rounded-full mb-4 dark:bg-zinc-400" name="close-outline"></ion-icon>
    <h3 class="text-2xl">{{'wordlist.noWords' | translate}}</h3>
    <p class="text-gray-500">{{'wordlist.addNewWord' | translate}}</p>
</div>
} @else {
<app-word-list-options></app-word-list-options>

<ng-container *ngIf="!wordList.length">
    <div class="flex flex-col items-center gap-1 bg-gray-100 p-6 rounded-xl shadow-xs dark:bg-zinc-800">
        <ion-icon class="p-3 text-6xl text-gray-600 bg-gray-200 ionicon-thick rounded-full mb-4 dark:bg-zinc-400" name="close-outline"></ion-icon>
        <h3 class="text-2xl">{{'wordlist.noWords' | translate}}</h3>
        <p class="text-gray-500">{{'wordlist.adjustSearchQuery' | translate}}</p>
    </div>
</ng-container>

<ng-container *ngIf="wordList.length">
    <ul class="flex flex-col gap-3" [ngClass]="isWordListLoaded ? 'animate-slideIn' : ''">
        @for (word of wordList; track word.id; let i = $index) {
        <app-word-list-item [word]="word"></app-word-list-item>
        }
    </ul>
    <app-pagination-container></app-pagination-container>
</ng-container>
}
