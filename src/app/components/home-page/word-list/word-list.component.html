@if (!wordList.length) {
<div class="flex flex-col items-center gap-1 bg-gray-100 p-6 rounded-xl">
    <ion-icon class="p-3 text-6xl text-gray-600 bg-gray-200 ionicon-thick rounded-full mb-4" name="close-outline"></ion-icon>
    <h3 class="text-2xl">No words to display.</h3>
    <p class="text-gray-500">Add new word by clicking button on right side of this webpage.</p>
</div>
} @else {
<ul class="flex flex-col gap-3">
    @for (word of wordList; track word.id) {
    <app-word-list-item [word]="word"></app-word-list-item>
    }
</ul>
}
