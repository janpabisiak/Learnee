@if (!sortedWordList.length) {
<div class="flex flex-col items-center gap-1 bg-gray-100 p-6 rounded-xl shadow-xs">
    <ion-icon class="p-3 text-6xl text-gray-600 bg-gray-200 ionicon-thick rounded-full mb-4" name="close-outline"></ion-icon>
    <h3 class="text-2xl">No words to display.</h3>
    <p class="text-gray-500">Add new word by clicking button on right side of this webpage.</p>
</div>
}

@if (sortedWordList.length) {
<app-word-list-options></app-word-list-options>

<ng-container *ngIf="!paginatedWordList.length">
    <div class="flex flex-col items-center gap-1 bg-gray-100 p-6 rounded-xl shadow-xs">
        <ion-icon class="p-3 text-6xl text-gray-600 bg-gray-200 ionicon-thick rounded-full mb-4" name="close-outline"></ion-icon>
        <h3 class="text-2xl">No words found.</h3>
        <p class="text-gray-500">Try to adjust your search query.</p>
    </div>
</ng-container>

<ng-container *ngIf="paginatedWordList.length">
    <ul class="flex flex-col gap-3" [ngClass]="isWordListLoaded ? 'animate-slideIn' : ''">
        @for (word of paginatedWordList; track word.id; let i = $index) {
        <app-word-list-item [word]="word"></app-word-list-item>
        }
    </ul>
    <app-pagination-container></app-pagination-container>
</ng-container>
}
