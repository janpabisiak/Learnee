<div [style.--animate-toaster]="`slideIn 1s forwards, slideOut 1s ${duration}s forwards`" class="bg-gray-100 rounded-md sticky z-10 animate-toaster">
    <div [style.--animate-elapsing]="`elapsing ${duration}s forwards`" class="
            relative p-4 flex gap-2 rounded-md overflow-hidden
            before:absolute before:w-full before:h-1 before:bottom-0 before:left-0 before:bg-gray-200 
            after:absolute after:w-full after:h-1 after:bottom-0 after:left-0 after:animate-elapsing
        " [ngClass]="{
            'after:bg-green-500': type === toasterTypes.Success,
            'after:bg-gray-500': type === toasterTypes.Loading,
            'after:bg-red-600': type === toasterTypes.Error,
        }">
        <ion-icon *ngIf="type === toasterTypes.Success" class="text-2xl ionicon-thick text-green-700" [name]="'checkmark-done-outline'"></ion-icon>
        <ion-icon *ngIf="type === toasterTypes.Loading" class="text-2xl ionicon-thick text-gray-700" [name]="'refresh-outline'"></ion-icon>
        <ion-icon *ngIf="type === toasterTypes.Error" class="text-2xl ionicon-thick text-red-700" [name]="'close-outline'"></ion-icon>
        <h5 class="text-xl">{{content}}</h5>
    </div>
</div>
