<div class="flex items-center justify-between border-b-1 border-gray-200 pb-5 dark:border-zinc-700">
    <h3 class="text-2xl font-semibold">{{title}}</h3>
    <ion-icon *ngIf="showCloseIcon" class="bg-gray-200 hover:bg-gray-300 transition duration-300 p-1 rounded-full text-2xl text-gray-600 ionicon-thick cursor-pointer dark:text-gray-800 dark:bg-zinc-500 dark:hover:bg-zinc-600" name="close-outline" (click)="onClose()"></ion-icon>
</div>
