<button class="flex items-center cursor-pointer transition duration-300" [ngClass]="{
        'bg-emerald-600 text-gray-100 hover:bg-emerald-700': type === EButtonTypes.Primary,
        'bg-gray-200 text-gray-900 hover:bg-gray-300': type === EButtonTypes.Secondary,
        'gap-1 px-8 py-3 rounded-md font-semibold': type !== EButtonTypes.NoBackground,
        'gap-1.5 text-xl text-gray-500 hover:text-gray-600': type === EButtonTypes.NoBackground
    }" (click)="onClick()">
    <ion-icon *ngIf="icon" class="text-2xl ionicon-thick" [name]="icon"></ion-icon>
    <ng-content></ng-content>
</button>
