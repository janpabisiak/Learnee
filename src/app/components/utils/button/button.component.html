<button class="flex items-center cursor-pointer transition duration-300" [ngClass]="{
        'bg-emerald-600 text-gray-100 enabled:hover:bg-emerald-700': type === EButtonTypes.Primary,
        'bg-gray-200 text-gray-900 enabled:hover:bg-gray-300': type === EButtonTypes.Secondary,
        'bg-red-700 text-gray-100 enabled:hover:bg-red-800': type === EButtonTypes.Danger,
        'gap-1 px-8 py-3 rounded-md font-semibold': type !== EButtonTypes.NoBackground,
        'gap-1.5 text-xl text-gray-500 enabled:hover:text-gray-600': type === EButtonTypes.NoBackground,
        'disabled:bg-gray-200 disabled:text-gray-400': disabled && type !== EButtonTypes.NoBackground,
        '!cursor-default': disabled
    }" (click)="onClick()" [disabled]="disabled">
    <ion-icon *ngIf="icon" class="text-2xl ionicon-thick" [name]="icon"></ion-icon>
    <ng-content></ng-content>
</button>
