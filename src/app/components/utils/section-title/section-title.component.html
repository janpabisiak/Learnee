<div class="flex items-center justify-between">
    <div class="flex items-center gap-4">
        <h2 class="text-5xl font-bold">{{title}}</h2>
        <app-tag *ngIf="tagContent">{{tagContent}}</app-tag>
    </div>
    @if (buttonContent && buttonType) {
    <app-button [type]="buttonType" [disabled]="buttonDisabled" [icon]="buttonIcon" (buttonClicked)="onButtonClicked()">{{buttonContent}}</app-button>
    }
</div>
