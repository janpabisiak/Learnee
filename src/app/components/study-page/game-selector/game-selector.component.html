<section class="grid md:grid-cols-2 xl:grid-cols-3 gap-3 my-8">
    <app-game-selector-item [isSelected]="allGamesSelected" (gameClicked)="toggleGameSelection($event)"></app-game-selector-item>
    @for (game of availableGames; track game.id) {
    <app-game-selector-item [game]="game" [isSelected]="selectedGames.includes(game.title)" (gameClicked)="toggleGameSelection($event)"></app-game-selector-item>
    }
</section>
