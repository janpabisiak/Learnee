<div [style.--animate-slideIn]="`slideIn 0.5s backwards ${game.id * .3}s`" class="flex gap-4 items-center border-2 bg-gray-50 border-gray-200 py-4 px-6 rounded-md cursor-pointer transition-all duration-300 animate-slideIn" [ngClass]="isSelected ? '!bg-blue-100/30 !border-blue-100' : ''" (click)="onGameClicked(game.title)">
    <ion-icon class="text-6xl text-gray-600 ionicon-thick" name="{{game.icon}}"></ion-icon>
    <div>
        <h3 class="text-2xl">{{game.title}}</h3>
        <p class="text-gray-500">{{game.description}}</p>
    </div>
</div>
