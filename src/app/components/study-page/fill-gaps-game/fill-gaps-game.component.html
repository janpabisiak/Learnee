@if (data) {
<div [ngClass]="isVisible ? 'animate-slideIn' : ''">
    <h2 class="text-4xl font-semibold mb-5"><span class="font-bold">{{currentStageId + 1}}.</span> What word is it?</h2>
    <div class="flex gap-2 flex-col items-center">
        <h5 class="text-xl">{{data.data.definition | sentencecase}}</h5>
        <input class="pb-1 font-bold tracking-[0.5ch] outline-0" [style.--n-char]="wordLength" [ngClass]="{
            'text-green-600': data.answered && data.answeredCorrect,
            'text-red-600': data.answered && !data.answeredCorrect,
        }" [maxLength]="wordLength" #answerInput />
    </div>
    <div class="mt-8 flex justify-end">
        <app-button class="[&>button]:w-48 [&>button]:justify-center" [type]="'primary'" [disabled]="data.answered" (buttonClicked)="answerQuestion()">Check answer</app-button>
    </div>
</div>
}
