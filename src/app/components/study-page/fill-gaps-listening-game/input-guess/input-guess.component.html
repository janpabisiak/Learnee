<input class="pb-1 font-bold tracking-[0.5ch] outline-0" [style.--n-char]="wordLength" [ngClass]="{
            'text-green-600 dark:text-green-800': answered && answeredCorrect,
            'text-red-600 dark:text-red-800': answered && !answeredCorrect,
        }" [maxLength]="wordLength" [value]="value" [disabled]="disabled" #input />
