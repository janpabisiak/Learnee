@if (data) {
<div [ngClass]="isVisible ? 'animate-slideIn' : ''">
    <h2 class="text-4xl font-semibold mb-5"><span class="font-bold">{{currentStageId + 1}}.</span> What word is it?</h2>
    <div class="flex gap-4 flex-col items-center">
        @if (data.type === EAvailableGames.FillGaps) {
        <h5 class="text-xl">{{data.data.definition | sentencecase}}</h5>
        } @else {
        <div class="flex justify-center items-center p-3 bg-emerald-600 rounded-2xl shadow-xs cursor-pointer" (click)="readWordDefinition()">
            <ion-icon class="text-7xl ionicon-thick text-emerald-900" name="play"></ion-icon>
        </div>
        }
        <app-input-guess [value]="inputValue" [answered]="data.answered" [answeredCorrect]="data.answeredCorrect" [wordLength]="wordLength" (valueChanged)="updateInputValue($event)"></app-input-guess>
    </div>
    <div class="mt-8 flex justify-end">
        <app-button class="[&>button]:w-48 [&>button]:justify-center" [type]="'primary'" [disabled]="data.answered" (buttonClicked)="answerQuestion()">Check answer</app-button>
    </div>
</div>
}
