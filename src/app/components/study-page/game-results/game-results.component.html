<section class="flex flex-col max-w-7xl mx-auto">
    <app-section-title [title]="'Game finished'" [buttonType]="'primary'" [buttonContent]="'Play again'" (buttonClicked)="cancelGame()"></app-section-title>
    <app-progress-bar class="[&>div>progress]:h-6 mt-6" [progress]="correctAnswerPercentage" [type]="'gameResults'" [tooltipContent]="`${correctAnswerAmount}/${stages.length}`"></app-progress-bar>
    <ul class="my-8 flex flex-col gap-5">
        @for (stage of stages; track stage.id) {
        <li class="border-2 bg-gray-50 border-gray-200 rounded-xl p-5">
            <app-game-container [stage]="stage"></app-game-container>
        </li>
        }
    </ul>
</section>
