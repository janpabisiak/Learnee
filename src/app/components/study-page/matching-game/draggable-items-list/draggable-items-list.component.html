<div class="flex flex-col gap-2" cdkDropList (cdkDropListDropped)="reorder(items, $event)">
    @for (item of items; track item; let i = $index) {
    <div class="flex justify-between items-center border-1 p-5 rounded-md cursor-grab select-none" [ngClass]="{
                'bg-gray-100 border-gray-300 dark:bg-zinc-800 dark:border-zinc-700': !answered,
                'bg-emerald-300 border-emerald-400 dark:bg-green-800 dark:border-green-900': answered && results[i],
                'bg-red-400 border-red-400 dark:bg-red-800 dark:border-red-900': answered && !results[i],
                'pointer-events-none animate-fadeIn': answered,
            }" cdkDrag>
        <p>{{i + 1}}. {{item}}</p>
        <ion-icon class="text-xl text-gray-400 ionicon-thick" [ngClass]="{
                    'text-gray-400': !answered,
                    'text-gray-800': answered,
                }" name="reorder-four-outline"></ion-icon>
    </div>
    }
</div>
