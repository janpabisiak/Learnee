<div class="grid grid-cols-2 gap-15">
    <div class="flex flex-col gap-2" cdkDropList (cdkDropListDropped)="reorder(terms, $event)">
        @for (term of terms; track term; let i = $index) {
        <div class="flex justify-between items-center border-1 p-5 rounded-md cursor-grab select-none" [ngClass]="{
            'bg-gray-100 border-gray-300': !results.length,
            'bg-emerald-300 border-emerald-400': results.length && results[i],
            'bg-red-400 border-red-400': results.length && !results[i],
            'pointer-events-none animate-fadeIn': results.length,
        }" cdkDrag>
            <p>{{term}}</p>
            <ion-icon class="text-xl text-gray-400 ionicon-thick" [ngClass]="{
                'text-gray-400': !results.length,
                'text-gray-800': results.length,
            }" name="reorder-four-outline"></ion-icon>
        </div>
        }
    </div>
    <div class="flex flex-col gap-2" cdkDropList (cdkDropListDropped)="reorder(definitions, $event)">
        @for (definition of definitions; track definition; let i = $index) {
        <div class="flex justify-between items-center border-1 p-5 rounded-md cursor-grab select-none" [ngClass]="{
            'bg-gray-100 border-gray-300': !results.length,
            'bg-emerald-300 border-emerald-400': results.length && results[i],
            'bg-red-400 border-red-400': results.length && !results[i],
            'pointer-events-none animate-fadeIn': results.length,
        }" cdkDrag>
            <p>{{definition}}</p>
            <ion-icon class="text-xl text-gray-400 ionicon-thick" [ngClass]="{
                'text-gray-400': !results.length,
                'text-gray-800': results.length,
            }" name="reorder-four-outline"></ion-icon>
        </div>
        }
    </div>
</div>
<app-button [type]="'primary'" (click)="checkAnswers()">Check answers</app-button>
