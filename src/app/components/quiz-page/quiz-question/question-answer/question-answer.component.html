<li class="p-4 border-1 rounded-md text-2xl" [ngClass]="{
    'bg-gray-100 border-gray-300 cursor-pointer': !showAnswer,
    'bg-emerald-300 border-emerald-400': showAnswer && answer.isCorrect,
    'bg-red-400 border-red-400': showAnswer && !answer.isCorrect,
    'animate-fadeIn cursor-default': showAnswer,
}" (click)="answerQuestion(answer.id)">
    {{answer.content}}
</li>
